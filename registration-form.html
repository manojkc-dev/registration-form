<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form</title>

        <!--Bootstrap CSS CDN Link-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    </head>


    <body>

        <!-- =========== form start =========== -->

        <div class="container mt-3">
            <div class="row justify-content-center">
                <div class="col-8">
                    <h3 class="bg-primary text-center text-white py-3">Student Registration Form</h3>
                    <form class="bg-light p-4 border border-top-0">
                        <div class="row">
                            <div class="mb-3 col-12 col-md-6">
                                <label for="firstname" class="form-label">First Name</label>
                                <input type="name" class="form-control" id="firstname" placeholder="Enter your first name">
                            </div>
                            <div class="mb-3 col-12 col-md-6">
                                <label for="lastname" class="form-label">Last Name</label>
                                <input type="name" class="form-control" id="lastname" placeholder="Enter your last name">
                            </div>
                        </div>


                        <div class="row">
                            <div class="mb-3 col-12 col-md-6">
                                <label for="email" class="form-label">Email address</label>
                                <input type="email" class="form-control" id="email" placeholder="Enter your email address">
                            </div>

                            <div class="mb-3 col-12 col-md-6">
                                <label for="contact" class="form-label">Contact Number</label>
                                <input type="text" class="form-control" id="contact" placeholder="Enter your contact number">
                            </div>
                        </div>


                        <div class="row">
                            <div class="mb-3 col-12 col-md-6">
                                <label for="address" class="form-label">Address</label>
                                <input type="text" class="form-control" id="address" placeholder="Enter your address">
                            </div>

                            <div class="mb-3 col-12 col-md-6">
                                <label for="country" class="form-label">Country</label>
                                <input type="text" class="form-control" id="country" placeholder="Enter your country name">
                            </div>
                        </div>

                        
                        <div class="row">
                            <div class="mb-3 col-12 col-md-6">
                                <label for ="gender" class="form-label">Gender</label>
                            <div>
                                <input type="radio" id="male" name="gender" value="Male">
                                <label for="male">Male</label>
                            </div>
                            <div>
                                <input type="radio" id="female" name="gender" value="Female">
                                <label for="female">Female</label>
                            </div>
                            <div>
                                <input type="radio" id="rather-not" name="gender" value="Rather not say" checked>
                                <label for="rather-not">Rather not to say</label>
                            </div>
                            </div>

                            <div class="mb-3 col-12 col-md-6">
                                <label for="dob" class="form-label">Date of Birth</label>
                                <input type="date" class="form-control" id="dob">
                            </div>
                        </div>


                        <div class="row">
                            <div class="mb-3 col-12 col-md-6">
                                <label for="picture" class="form-label">Profile Picture</label>
                                <input type="file" class="form-control" id="picture">
                            </div>

                            <div class="mb-3 col-12 col-md-6">
                                <label for="confirmpw" class="form-label">Subjects</label>
                                <div class="dropdown">
                                    <select class="form-select" id="subjects" aria-label="Default select example">
                                    <option selected>Select your subject</option>
                                    <option value="1" selected>Python</option>
                                    <option value="2">Java</option>
                                    <option value="3">JavaScript</option>
                                    <option value="4">TypeScript</option>
                                    <option value="5">C#</option>
                                    <option value="6">C++</option>
                                    </select>
                                </div>
                            </div>
                        </div>


                        <div class="row">
                            <div class="mb-3 col-12 col-md-6">
                                <label for="passw" class="form-label">Password</label>
                                <input type="password" class="form-control" id="passw" placeholder="Enter your password">
                            </div>

                            <div class="mb-3 col-12 col-md-6">
                                <label for="confirmpw" class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" id="confirmpw" placeholder="Confirm your password">
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">Submit</button>

                    </form>
                </div>
            </div>
        </div>

        <!-- =========== form end =========== -->

        
        <!--Bootstrap JavaScript CDN Link-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous">
        </script>

    </body>

</html>
